name: Nightly Data Update

on:
  schedule:
    # 每晚 22:00 UTC+8 = 14:00 UTC
    - cron: '0 14 * * *'
  workflow_dispatch:  # 允許手動觸發

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Update site data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_data_ci.py

      - name: Commit and push if changed
        run: |
          git config user.name "MAGI Auto Update"
          git config user.email "magi@whalechao.github.io"
          git add data/site-data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update site data $(date +%Y-%m-%d)"
            git push
          fi
